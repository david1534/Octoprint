name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: printforge/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: printforge/backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: python -m ruff check app/ tests/

      - name: Check formatting with ruff
        run: python -m ruff format --check app/ tests/

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --cov=app --cov-report=term-missing

      - name: Smoke test — boot backend in mock-serial mode
        env:
          PRINTFORGE_MOCK_SERIAL: "1"
          PRINTFORGE_GCODE_DIR: /tmp/printforge/gcodes
          PRINTFORGE_DATA_DIR: /tmp/printforge/data
        run: |
          mkdir -p /tmp/printforge/gcodes /tmp/printforge/data
          python - <<'EOF'
          import asyncio, httpx
          from uvicorn import Config, Server
          from app.main import app

          async def main():
              server = Server(Config(app, host="127.0.0.1", port=8765, log_level="warning"))
              task = asyncio.create_task(server.serve())
              # Wait for startup
              for _ in range(50):
                  if server.started:
                      break
                  await asyncio.sleep(0.1)
              async with httpx.AsyncClient() as c:
                  r = await c.get("http://127.0.0.1:8765/api/system/health", timeout=5)
                  assert r.status_code == 200, f"health status={r.status_code}"
              server.should_exit = True
              await task
          asyncio.run(main())
          EOF

  py39-compat:
    name: Python 3.9 syntax check (Pi target)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: printforge/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Compile all backend sources under Python 3.9
        run: python -m compileall -q app/
      - name: Ruff check with py39 target
        run: |
          python -m pip install --upgrade pip
          pip install "ruff>=0.8"
          python -m ruff check --target-version py39 --select=UP,F,E9 app/

  frontend:
    name: Frontend (SvelteKit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: printforge/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: printforge/frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Svelte check (type checking)
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Build
        run: npm run build

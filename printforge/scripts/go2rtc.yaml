# go2rtc configuration for PrintForge
# Documentation: https://github.com/AlexxIT/go2rtc

streams:
  printer_cam:
    # USB Webcam (most common)
    - exec:ffmpeg -f v4l2 -input_format mjpeg -video_size 1280x720 -framerate 30 -i /dev/video0 -pix_fmt yuv420p -c:v h264_v4l2m2m -b:v 2M -g 30 -f h264 -
    # If using Raspberry Pi Camera Module, comment above and uncomment below:
    # - exec:libcamera-vid -t 0 --inline -o - --width 1280 --height 720 --framerate 15

api:
  listen: ":1984"

webrtc:
  listen: ":8555"
  ice_servers:
    - urls: [stun:stun.l.google.com:19302]

# go2rtc configuration for PrintForge
# Documentation: https://github.com/AlexxIT/go2rtc
#
# Latency tuning notes:
#   - 640x480 is plenty for monitoring a print bed (75% fewer pixels than 720p)
#   - Camera outputs native MJPEG at 30fps — passthrough avoids H.264 encoding
#     overhead entirely and lets go2rtc serve MJPEG directly to the browser
#   - -c:v copy = zero-CPU passthrough (no re-encoding)

streams:
  printer_cam:
    # USB Webcam — native MJPEG passthrough (lowest latency, zero CPU encoding)
    - exec:ffmpeg -f v4l2 -input_format mjpeg -video_size 640x480 -framerate 30 -i /dev/video0 -c:v copy -f mjpeg -
    # If using Raspberry Pi Camera Module, comment above and uncomment below:
    # - exec:libcamera-vid -t 0 --inline --codec mjpeg -o - --width 640 --height 480 --framerate 30

api:
  listen: ":1984"

webrtc:
  listen: ":8555"
  # Advertise the Tailscale IP so browsers connecting via Tailscale
  # can reach the WebRTC UDP port directly.
  candidates:
    - 100.108.194.105:8555
  ice_servers:
    - urls: [stun:stun.l.google.com:19302]
